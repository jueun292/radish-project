# "Ours+" spec. Self-contained: experiment-runner runs from this file alone.
# DINOv3 ViT-B/16 (self-supervised pretrained, FROZEN) @512 + 2-layer MLP head.
# Only the head (~0.66M params) is trained; backbone (85.6M) is frozen.
# Scaled-up variant of Ours (vit_small@256, 384-d) -> 768-d feature, wider head.
# This is the PRIMARY comparison cell (hardest 3-class setting).
name: dinov3_base_normal_d3_d4
task: classification
model:
  builder: src.models.build_classifier
  arch: dinov3_base
  num_classes: 3
  img_size: 512
  pretrained: true
  frozen_backbone: true
  head_hidden: 512
  source: timm  # vit_base_patch16_dinov3, feat dim 768
data:
  builder: build_classification_loaders
  setting: normal_d3_d4
  img_size: 512
  batch_size: 64       # frozen base@512 batch4 forward ~505MB -> 64 fits; runner may lower
  num_workers: 8
optim:
  name: adamw
  lr: 0.001            # head-only -> larger lr; frozen features converge fast
  wd: 0.05
  epochs: 40           # head probe over frozen feats; a touch more than small (30) for the wider head
  sched: cosine
  warmup_epochs: 3
loss:
  type: cross_entropy
  class_weights: from_meta
  label_smoothing: 0.0
eval:
  metrics:
  - pr_auc
  - macro_f1
  - recall_disease
  - precision_disease
  - confusion
  - accuracy
  - auroc
  primary: pr_auc
  primary_3class_note: for normal_d3_d4 use macro PR-AUC (one-vs-rest) as primary
  threshold_policy: argmax for prediction; PR-AUC swept over disease score
early_stop:
  monitor: val_pr_auc
  mode: max
  patience: 10
class_names:
- normal
- disease_3
- disease_4
seed: 42
packages:
- torch
- torchvision
- timm
- scikit-learn
- pyyaml
smoke: true
